<!DOCTYPE html>

<style>
:root {
  --primary: #003D8A;
  --accent:  #FECC00;
  --dark:    #0d0d1a;
  --dark2:   #12122a;
  --card:    #1a1a35;
  --text:    #f0f0f5;
  --muted:   #8888aa;
  --live:    #00c853;
  --border:  #2a2a55;
  --ft:      #6666aa;

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--dark);color:var(--text);min-height:100vh;font-size:14px;}

/* ── HEADER ── */
header{background:linear-gradient(160deg,#001f5c 0%,var(--dark) 100%);border-bottom:2px solid var(--accent);padding:14px 16px 0;position:sticky;top:0;z-index:50;}
.hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.hdr-badge{background:var(--accent);color:#000;font-size:10px;font-weight:900;padding:4px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:1px;white-space:nowrap;}
.hdr-title{flex:1;}
.hdr-title h1{font-size:15px;font-weight:800;line-height:1.2;}
.hdr-title p{font-size:11px;color:var(--muted);margin-top:1px;}
.tabs{display:flex;}
.tab-btn{flex:1;padding:9px 8px;background:transparent;border:none;border-bottom:3px solid transparent;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.5px;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-btn:hover:not(.active){color:var(--text);}

/* ── LAYOUT ── */
main{padding:12px;max-width:780px;margin:0 auto;}
.section{display:none;}.section.active{display:block;}

/* ── LIVE NOW ── */
.now-playing{background:linear-gradient(135deg,#00380f,#006020);border:1px solid var(--live);border-radius:14px;padding:16px;margin-bottom:14px;text-align:center;}
.live-badge{display:inline-flex;align-items:center;gap:6px;background:var(--live);color:#000;font-size:10px;font-weight:900;padding:3px 12px;border-radius:20px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;}
.live-dot{width:7px;height:7px;background:#000;border-radius:50%;animation:blink 1.2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.live-matchup{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;}
.live-team{text-align:center;min-width:90px;}
.live-flag{font-size:30px;display:block;}
.live-name{font-size:12px;color:rgba(255,255,255,.8);margin-top:3px;font-weight:700;}
.live-score-big{font-size:44px;font-weight:900;min-width:110px;letter-spacing:3px;color:#fff;text-shadow:0 2px 8px rgba(0,200,80,.4);}
.live-meta{font-size:11px;color:rgba(255,255,255,.5);margin-top:8px;}

/* ── SECTION LABEL ── */
.sec-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin:14px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;}
.sec-label::before{content:'';display:block;width:3px;height:12px;background:var(--accent);border-radius:2px;}

/* ── POOL STANDINGS ── */
.pools-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px;margin-bottom:4px;}
.pool-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.pool-hdr{background:var(--primary);padding:6px 12px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);}
table.ptbl{width:100%;border-collapse:collapse;}
.ptbl th{padding:5px 8px;font-size:10px;text-align:center;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);}
.ptbl th:first-child{text-align:left;}
.ptbl td{padding:7px 8px;font-size:12px;text-align:center;border-bottom:1px solid #1e1e3a;}
.ptbl td:first-child{text-align:left;}
.ptbl tr:last-child td{border-bottom:none;}
.ptbl tr.leader td{background:rgba(254,204,0,.05);}
.tcell{display:flex;align-items:center;gap:6px;font-weight:600;}
.tflag{font-size:15px;flex-shrink:0;}
.tname{font-size:11px;white-space:nowrap;}
.pts-cell{font-weight:800;color:var(--accent);}

/* ── FIXTURES ── */

.day-label{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;padding-left:2px;}
.mrow{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:5px;display:flex;align-items:center;gap:8px;}
.mrow.is-live{border-color:var(--live);background:linear-gradient(135deg,rgba(0,200,80,.07),var(--card));}
.mrow.is-ft{opacity:.85;}
.mrow.is-tbd{opacity:.5;}
.mrow.is-knockout{border-color:#2a3a5a;}
.mtime{min-width:46px;text-align:center;flex-shrink:0;}
.mtime .t{font-size:12px;font-weight:600;}
.mtime .s{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-top:1px;}
.s-live{color:var(--live);}
.s-ft{color:var(--ft);}
.s-muted{color:var(--muted);}
.mteams{flex:1;display:flex;align-items:center;gap:6px;justify-content:space-between;min-width:0;}
.mteam{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;flex:1;min-width:0;}
.mteam.away{flex-direction:row-reverse;text-align:right;}
.mflag{font-size:17px;flex-shrink:0;}
.mname{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mname.tbd-label{color:var(--muted);font-size:11px;font-weight:400;font-style:italic;}

.mscore.no-sc{font-size:13px;color:var(--muted);font-weight:400;letter-spacing:1px;}

/* ── FOOTER ── */

.footer-bar a{color:var(--accent);text-decoration:none;}

// ═══════════════════════════════════════════════════
// SCORES
// ═══════════════════════════════════════════════════
let SCORES={};

async function fetchSheet(){
  try{
    const r=await fetch(SHEET_CSV,{cache:'no-store'});
    if(!r.ok)return false;
    const csv=await r.text();
    const fresh={};
    // Columns: empty(0) | Country1(1) | Flag1(2) | Country2(3) | Flag2(4) | MatchID(5) | HomeScore(6) | AwayScore(7)
    csv.trim().split('\n').slice(1).forEach(line=>{
      const p=line.split(',').map(s=>s.trim().replace(/^"|"$/g,''));
      const id=p[5],h=parseInt(p[6]),a=parseInt(p[7]);
      if(id&&/^[WM]\d+$/.test(id)&&!isNaN(h)&&!isNaN(a)) fresh[id]={h,a};
    });
    SCORES=fresh;
    return true;
  }catch(e){ return false; }
}

function getScore(id){ return SCORES[id]||null; }

// ═══════════════════════════════════════════════════
// STATUS
// ═══════════════════════════════════════════════════
function getStatus(m){
  const sc=getScore(m.id);
  if(sc) return 'ft';
  if(m.h==='TBD'||m.time==='TBD') return 'tbd';
  const start=new Date(`${m.date}T${m.time}:00+02:00`);
  const now=new Date();
  const end=new Date(start.getTime()+25*60*1000);
  if(now>=start&&now<end) return 'live';
  if(now>=end) return 'ended';
  return 'upcoming';
}

// ═══════════════════════════════════════════════════
// STANDINGS
// ═══════════════════════════════════════════════════
function calcStandings(matches,teamCodes){
  const st={};
  teamCodes.forEach(c=>st[c]={pld:0,w:0,d:0,l:0,pf:0,pa:0,pts:0});
  matches.forEach(m=>{
    const sc=getScore(m.id);
    if(!sc||!(m.h in st)||!(m.a in st))return;
    const hg=sc.h,ag=sc.a;
    st[m.h].pld++;st[m.a].pld++;
    st[m.h].pf+=hg;st[m.h].pa+=ag;
    st[m.a].pf+=ag;st[m.a].pa+=hg;
    if(hg>ag){st[m.h].w++;st[m.h].pts+=3;st[m.a].l++;}
    else if(hg<ag){st[m.a].w++;st[m.a].pts+=3;st[m.h].l++;}
    else{st[m.h].d++;st[m.h].pts+=1;st[m.a].d++;st[m.a].pts+=1;}
  });
  return teamCodes.map(c=>({code:c,...st[c],pd:st[c].pf-st[c].pa}))
    .sort((a,b)=>b.pts-a.pts||b.pd-a.pd);
}

function poolCard(letter,teams,standings){
  const rows=standings.map((t,i)=>{
    const team=T[t.code]||T.TBD;
    return `<tr class="${i===0?'leader':''}">
      <td><div class="tcell"><span class="tflag">${team.f}</span><span class="tname">${team.n}</span></div></td>
      <td>${t.pld}</td><td>${t.w}</td><td>${t.l}</td>
      <td>${t.pd>0?'+'+t.pd:t.pd}</td>
      <td class="pts-cell">${t.pts}</td>
    </tr>`;
  }).join('');
  return `<div class="pool-card">
    <div class="pool-hdr">Pool ${letter}</div>
    <table class="ptbl">
      <thead><tr><th>Team</th><th>P</th><th>W</th><th>L</th><th>PD</th><th>Pts</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

  const t=T[code]||T.TBD;
  const isTBD=code==='TBD';
  return `<div class="mteam ${side}">
    <span class="mflag">${isTBD?'':t.f}</span>
    <span class="${isTBD?'mname tbd-label':'mname'}">${t.n}</span>
  </div>`;
}

function matchRow(m){
  const sc=getScore(m.id);
  const st=getStatus(m);
  const isKnockout=!m.pool&&!m.pool2;
  let rowCls='mrow'+(isKnockout?' is-knockout':'');
  let timePart,scorePart;

  if(st==='tbd'||m.h==='TBD'){
    rowCls+=' is-tbd';
    timePart=`<div class="mtime"><div class="t">—</div><div class="s s-muted">TBD</div></div>`;
    scorePart=`<div class="mscore no-sc">TBD</div>`;
  } else if(st==='live'){
    rowCls+=' is-live';
    timePart=`<div class="mtime"><div class="t">${m.time}</div><div class="s s-live">● LIVE</div></div>`;
    scorePart=sc?`<div class="mscore">${sc.h}&thinsp;·&thinsp;${sc.a}</div>`:`<div class="mscore no-sc">– · –</div>`;
  } else if(sc){
    rowCls+=' is-ft';
    timePart=`<div class="mtime"><div class="t">${m.time}</div><div class="s s-ft">FT</div></div>`;
    scorePart=`<div class="mscore">${sc.h}&thinsp;·&thinsp;${sc.a}</div>`;
  } else if(st==='ended'){
    timePart=`<div class="mtime"><div class="t">${m.time}</div><div class="s s-muted">—</div></div>`;
    scorePart=`<div class="mscore no-sc">? · ?</div>`;
  } else {
    timePart=`<div class="mtime"><div class="t">${m.time}</div></div>`;
    scorePart=`<div class="mscore no-sc">vs</div>`;
  }

  return `<div class="${rowCls}">
    ${timePart}
    <div class="mteams">${teamHtml(m.h,'home')}${scorePart}${teamHtml(m.a,'away')}</div>
    <div class="mphase">${m.phase}</div>
  </div>`;
}

function renderLiveNow(tour){
  const np=document.getElementById(`np-${tour}`);
  const body=document.getElementById(`np-${tour}-body`);
  const live=DATA[tour].matches.find(m=>getStatus(m)==='live');
  if(!live){np.style.display='none';return;}
  const sc=getScore(live.id);
  const ht=T[live.h]||T.TBD,at=T[live.a]||T.TBD;
  np.style.display='block';
  body.innerHTML=`<div class="live-matchup">
    <div class="live-team"><span class="live-flag">${ht.f}</span><span class="live-name">${ht.n}</span></div>
    <div class="live-score-big">${sc?sc.h:'–'}&nbsp;·&nbsp;${sc?sc.a:'–'}</div>
    <div class="live-team"><span class="live-flag">${at.f}</span><span class="live-name">${at.n}</span></div>
  </div>
  <div class="live-meta">${live.phase} · Kick-off ${live.time} local</div>`;
}

function resolveSeed(seed){
  const m=seed.match(/^(\d+)(?:st|nd|rd|th) Pool ([ABC])$/);
  if(!m)return null;
  const rank=parseInt(m[1])-1,letter=m[2];
  const teams=DATA.men.pools[letter];
  const matches=DATA.men.matches.filter(x=>x.pool===letter&&x.ph===1);
  const standings=calcStandings(matches,teams);
  return standings[rank]?standings[rank].code:null;
}

function renderPools(tour){
  const el=document.getElementById(`pg-${tour}`);
  el.innerHTML=Object.keys(DATA[tour].pools).map(letter=>{
    const teams=DATA[tour].pools[letter];
    const matches=DATA[tour].matches.filter(m=>m.pool===letter);
    return poolCard(letter,teams,calcStandings(matches,teams));
  }).join('');
}

function renderMenPools2(){
  const el=document.getElementById('pg-men2');
  el.innerHTML=Object.keys(DATA.men.pools2).map(letter=>{
    const pool=DATA.men.pools2[letter];
    const rows=pool.seeds.map((seed,i)=>{
      const code=resolveSeed(seed);
      const team=code?T[code]:null;
      return `<tr class="${i===0?'leader':''}">
        <td><div class="tcell">${team
          ?`<span class="tflag">${team.f}</span><span class="tname">${team.n}</span>`
          :`<span class="tname" style="color:var(--muted);font-style:italic">${seed}</span>`
        }</div></td>
        <td>—</td><td>—</td><td>—</td><td>—</td><td class="pts-cell">—</td>
      </tr>`;
    }).join('');
    return `<div class="pool-card">
      <div class="pool-hdr">Pool ${letter}</div>
      <table class="ptbl">
        <thead><tr><th>Team</th><th>P</th><th>W</th><th>L</th><th>PD</th><th>Pts</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }).join('');
}

function renderFixtures(tour){
  const el=document.getElementById(`fx-${tour}`);
  const byDate={};
  DATA[tour].matches.forEach(m=>{if(!byDate[m.date])byDate[m.date]=[];byDate[m.date].push(m);});
  el.innerHTML=Object.entries(byDate).map(([date,ms])=>
    `<div class="day-group"><div class="day-label">${DATE_LABELS[date]||date}</div>${ms.map(matchRow).join('')}</div>`
  ).join('');
}

function render(){
  ['women','men'].forEach(t=>{renderLiveNow(t);renderPools(t);renderFixtures(t);});
  renderMenPools2();
}

// ═══════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════
function showTab(tab){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`sec-${tab}`).classList.add('active');
  document.querySelectorAll('.tab-btn')[tab==='women'?0:1].classList.add('active');
}

// ═══════════════════════════════════════════════════
// INIT + AUTO-REFRESH
// ═══════════════════════════════════════════════════
function updateFooter(ok){
  const el=document.getElementById('rinfo');
  if(el) el.textContent=ok
    ?`Updated ${new Date().toLocaleTimeString()} · refreshes every 30s`
    :`Last update failed · retrying…`;
}

async function refresh(){
  const ok=await fetchSheet();
  render();
  updateFooter(ok);
}

refresh();
setInterval(refresh,30000);
</script>
</body>
</html>
